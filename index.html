<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador 8 DPIs - Formato Numérico</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #f0f2f5; padding: 20px; margin: 0; }
        
        .no-print { 
            background: white; padding: 20px; border-radius: 10px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin: 0 auto 30px auto;
            max-width: 600px; text-align: center;
        }

        #contenedor {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            width: 190mm;
            margin: 0 auto;
        }

        .dpi-card {
            width: 90mm; 
            height: 63mm;
            background-image: url('image_26d4a3.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            position: relative;
            background-color: white;
            border: 1px solid #ddd;
            overflow: hidden;
        }

        .dato {
            position: absolute;
            font-weight: bold;
            color: #1a1a1a;
        }

        /* Coordenadas calculadas según tus ajustes de 700x494px */
        .nombre-txt { 
            top: 34.4%;  /* 170px */
            left: 40%;   /* 280px */
            font-size: 9.5pt; 
            text-transform: uppercase;
        }

        .sexo-txt { 
            top: 64.7%;  /* 320px */
            left: 40%;   /* 280px */
            font-size: 8.5pt;
            text-transform: uppercase;
        }

        .fecha-txt { 
            top: 83%;    /* 410px */
            left: 35.7%; /* 250px */
            font-size: 9pt;
        }

        .foto-estudiante {
            position: absolute;
            top: 43.9%;  /* 217px */
            right: 8.5%; /* 60px */
            width: 21.4%; /* 150px proporcional */
            height: 40.5%; /* 200px proporcional */
            border-radius: 8px; /* Ajustado al tamaño pequeño */
            object-fit: cover;
        }

        @media print {
            .no-print { display: none; }
            body { background: white; padding: 0; }
            #contenedor { gap: 4px; padding: 5mm; }
            .dpi-card { -webkit-print-color-adjust: exact; page-break-inside: avoid; border: 0.1mm solid #eee; }
        }
    </style>
</head>
<body>

    <div class="no-print">
        <h2>Panel de Registro - Visual Lab</h2>
        <input type="text" id="nombre" placeholder="Nombre Completo" style="width:90%; padding:8px; margin:5px;">
        <select id="sexo" style="width:94%; padding:8px; margin:5px;">
            <option value="MASCULINO">MASCULINO</option>
            <option value="FEMENINO">FEMENINO</option>
        </select>
        <input type="date" id="fecha" style="width:90%; padding:8px; margin:5px;">
        <input type="file" id="foto" accept="image/*" style="width:90%; padding:8px; margin:5px;">
        <button onclick="agregarEstudiante()" style="width:94%; padding:10px; background:#27ae60; color:white; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">
            ✅ Agregar Estudiante
        </button>
        <button onclick="window.print()" style="width:94%; padding:10px; background:#2c3e50; color:white; border:none; border-radius:5px; font-weight:bold; margin-top:10px; cursor:pointer;">
            🖨️ Imprimir Hoja (8 DPIs)
        </button>
    </div>

    <div id="contenedor"></div>

    <script>
        function agregarEstudiante() {
            const nombre = document.getElementById('nombre').value;
            const sexo = document.getElementById('sexo').value;
            const fechaRaw = document.getElementById('fecha').value;
            const inputFoto = document.getElementById('foto');

            if(!nombre || !fechaRaw || inputFoto.files.length === 0) {
                alert("Faltan datos o la foto."); return;
            }

            // Convertir fecha de AAAA-MM-DD a DD/MM/AAAA
            const partes = fechaRaw.split("-");
            const fechaNumerica = `${partes[2]}/${partes[1]}/${partes[0]}`;

            const reader = new FileReader();
            reader.onload = function(e) {
                const card = document.createElement('div');
                card.className = 'dpi-card';
                card.innerHTML = `
                    <div class="dato nombre-txt">${nombre}</div>
                    <div class="dato sexo-txt">${sexo}</div>
                    <div class="dato fecha-txt">${fechaNumerica}</div>
                    <img src="${e.target.result}" class="foto-estudiante">
                `;
                document.getElementById('contenedor').appendChild(card);
                
                // Limpiar campos
                document.getElementById('nombre').value = "";
                document.getElementById('fecha').value = "";
                inputFoto.value = "";
            }
            reader.readAsDataURL(inputFoto.files[0]);
        }
    </script>
</body>
</html>
